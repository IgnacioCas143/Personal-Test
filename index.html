<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Horario Equipo</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">

  <header>
    <h1>HORARIO</h1>
    <div>
      <button id="addMemberBtn">+ Integrante</button>
      <button id="addClassBtn">+ Clase</button>
    </div>
  </header>
  
    

  <div class="main">
    <div class="schedule" id="schedule"></div>

    <aside class="sidebar">
      <h2>Integrantes</h2>
      <ul id="memberList"></ul>
    </aside>
  </div>

</div>

<!-- MODAL -->
<div id="modal" class="modal hidden">
  <div class="modal-content">
    <h2 id="modalTitle">Clase</h2>

    <label>Integrante</label>
    <select id="memberSelect"></select>

    <label>Día</label>
    <select id="daySelect"></select>

    <label>Hora inicio</label>
    <select id="hourSelect"></select>

    <label>Duración</label>
    <input type="number" id="durationInput" min="1" max="10">

    <button id="saveClass">Guardar</button>
    <button id="deleteClass">Eliminar</button>
    <button id="closeModal">Cancelar</button>
  </div>
</div>
<!-- MODAL2 -->
<div id="memberModal" class="modal hidden">
  <div class="modal-content">
    <h2 id="memberModalTitle">Integrante</h2>

    <label>Nombre</label>
    <input type="text" id="memberNameInput">

    <label>Color</label>
    <input type="color" id="memberColorInput">

    <label>Patrón</label>
    <div id="patternOptions" class="patterns">
      <div class="pattern-box" data-pattern=""></div>
      <div class="pattern-box pattern-stripes" data-pattern="pattern-stripes"></div>
      <div class="pattern-box pattern-dots" data-pattern="pattern-dots"></div>
      <div class="pattern-box pattern-stripes-vertical" data-pattern="pattern-stripes-vertical"></div>
      <div class="pattern-box pattern-cross" data-pattern="pattern-cross"></div>
      <div class="pattern-box pattern-stripes-inver" data-pattern="pattern-stripes-inver"></div>
    </div>

    <button id="saveMember">Guardar</button>
    <button id="deleteMember">Eliminar</button>
    <button id="closeMemberModal">Cancelar</button>
  </div>
</div>



<script src="app.js"></script>
</body>
</html>
